# Shrap Firm - Phase 1 substrate stack
#
# Single-host Docker Compose for the Dell (shrap-prod on the Tailscale tailnet).
# This file IS the deployment spec. If you need to change the substrate, change
# this file and PR it; do not click around in the TrueNAS UI.
#
# Voice: boring beats clever. Well-known images, named volumes, restart
# unless-stopped. All images pinned to a specific minor version - no :latest
# drift on production-critical services. Update via PR.
#
# All host ports bind to 127.0.0.1 only. Remote access to anything in this
# stack goes via Tailscale + SSH tunnel (see docs/runbooks/dell-bootstrap.md).
# Inter-container traffic uses the shrap_net bridge with service DNS names.
#
# Substrate plus the deployed agent services (Operations, Risk and Compliance,
# Trading Floor, Intelligence). Per-agent specs live in docs/agents/.

networks:
  shrap_net:
    driver: bridge

volumes:
  redis_data:
  pg_data:
  qdrant_storage:
  langfuse_pg_data:
  prom_data:
  grafana_data:
  ollama_models:

services:

  # -------------------------------------------------------------------------
  # Redis - cross-department message bus (Streams) + cache.
  # ADR-0001 commits Redis Streams. AOF every-second is the right
  # durability/throughput tradeoff for an event bus.
  # -------------------------------------------------------------------------
  redis:
    image: redis:7.4-alpine
    container_name: shrap_redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --save
      - "900 1"
      - --save
      - "300 10"
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - shrap_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # -------------------------------------------------------------------------
  # Postgres + TimescaleDB - primary OLTP + time-series store.
  # All agent-owned tables live here. Langfuse uses its own DB (below).
  # -------------------------------------------------------------------------
  postgres:
    image: timescale/timescaledb-ha:pg16
    container_name: shrap_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${SHRAP_DB_USER}
      POSTGRES_PASSWORD: ${SHRAP_DB_PASSWORD}
      POSTGRES_DB: ${SHRAP_DB_NAME}
    volumes:
      - pg_data:/home/postgres/pgdata/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - shrap_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SHRAP_DB_USER} -d ${SHRAP_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # Qdrant - vector store for embeddings (research memory, document search).
  # 6333 HTTP, 6334 gRPC. Native Prometheus /metrics on 6333.
  # -------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.11.0
    container_name: shrap_qdrant
    restart: unless-stopped
    volumes:
      - qdrant_storage:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    networks:
      - shrap_net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:6333/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # Langfuse DB - dedicated Postgres for Langfuse. Kept separate so its
  # migrations cannot collide with the firm's main schema.
  # No host port binding - only reached from the langfuse container.
  # -------------------------------------------------------------------------
  langfuse-db:
    image: postgres:16.4-alpine
    container_name: shrap_langfuse_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${LANGFUSE_DB_USER}
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD}
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_pg_data:/var/lib/postgresql/data
    networks:
      - shrap_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LANGFUSE_DB_USER} -d langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # Langfuse - LLM tracing UI / collector. ADR-0004 keeps Langfuse for LLM
  # specifics; Prometheus+Grafana covers everything else.
  # -------------------------------------------------------------------------
  langfuse:
    image: langfuse/langfuse:2
    container_name: shrap_langfuse
    restart: unless-stopped
    depends_on:
      langfuse-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${LANGFUSE_DB_USER}:${LANGFUSE_DB_PASSWORD}@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      SALT: ${SALT}
      TELEMETRY_ENABLED: "false"
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - shrap_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/public/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # -------------------------------------------------------------------------
  # Prometheus - metrics scrape + storage. 30-day retention per ADR-0004.
  # Scrape config lives in ./prometheus/prometheus.yml - the repo is truth.
  # -------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: shrap_prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - shrap_net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # Grafana - dashboards for incident investigation. Mike's routine surface
  # is the daily briefing; Grafana is for digging when something breaks.
  # Bound to 3001 on the host because Langfuse owns 3000.
  # -------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.2.0
    container_name: shrap_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3001:3000"
    networks:
      - shrap_net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # Ollama - local LLM serving. GPU passthrough via NVIDIA Container Toolkit.
  # Hosts Qwen 3.5 9B on the Dell per docs/infrastructure/llm-routing.md.
  # Image >= 0.31.x required for Qwen 3.5-generation models; 0.31.2 also
  # enables flash attention on older NVIDIA GPUs (the GTX 1080).
  # -------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:0.31.2
    container_name: shrap_ollama
    restart: unless-stopped
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    networks:
      - shrap_net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # -------------------------------------------------------------------------
  # node-exporter - host CPU / memory / disk / network metrics.
  # Uses host networking on :9100 - intentional, needs host-level visibility.
  # -------------------------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: shrap_node_exporter
    restart: unless-stopped
    command:
      - --path.rootfs=/host
      - --web.listen-address=127.0.0.1:9100
    pid: host
    network_mode: host
    volumes:
      - /:/host:ro,rslave

  # -------------------------------------------------------------------------
  # cadvisor - per-container CPU / memory / restart counts.
  # -------------------------------------------------------------------------
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: shrap_cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - shrap_net

  # -------------------------------------------------------------------------
  # redis-exporter - Redis throughput, memory, stream length, consumer lag.
  # -------------------------------------------------------------------------
  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: shrap_redis_exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://redis:6379"
    ports:
      - "127.0.0.1:9121:9121"
    networks:
      - shrap_net
    depends_on:
      redis:
        condition: service_healthy

  # -------------------------------------------------------------------------
  # postgres-exporter - Postgres connection pool, table sizes, replication lag.
  # -------------------------------------------------------------------------
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: shrap_postgres_exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${SHRAP_DB_USER}:${SHRAP_DB_PASSWORD}@postgres:5432/${SHRAP_DB_NAME}?sslmode=disable"
    ports:
      - "127.0.0.1:9187:9187"
    networks:
      - shrap_net
    depends_on:
      postgres:
        condition: service_healthy

  # -------------------------------------------------------------------------
  # Health Monitor - the first agent. No-LLM, polls Prometheus for
  # substrate health, publishes ops.health-* events on Redis Streams,
  # alerts via Discord (routine) / ntfy.sh (urgent). See
  # docs/agents/operations/health-monitor.md.
  # -------------------------------------------------------------------------
  health-monitor:
    build:
      context: ../
      dockerfile: infra/health-monitor.Dockerfile
    container_name: shrap_health_monitor
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HEALTH_MONITOR_REDIS_URL: "redis://redis:6379/0"
      HEALTH_MONITOR_PROM_URL: "http://prometheus:9090"
    depends_on:
      redis:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    networks:
      - shrap_net

  # -------------------------------------------------------------------------
  # Audit Logger - persists every configured Redis Stream envelope into
  # PostgreSQL ops.audit_events for forensic reconstruction.
  # -------------------------------------------------------------------------
  audit-logger:
    build:
      context: ../
      dockerfile: infra/audit-logger.Dockerfile
    container_name: shrap_audit_logger
    restart: unless-stopped
    env_file:
      - .env
    environment:
      AUDIT_LOGGER_REDIS_URL: "redis://redis:6379/0"
      AUDIT_LOGGER_STREAM_PATTERN: "*"
      AUDIT_LOGGER_POSTGRES_DSN: "postgresql://${SHRAP_DB_USER}:${SHRAP_DB_PASSWORD}@postgres:5432/${SHRAP_DB_NAME}"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - shrap_net

  # -------------------------------------------------------------------------
  # Pre-Trade Checker - deterministic Month 1 risk gate. Consumes
  # trading.decision.intent and publishes risk.intent.approved/vetoed.
  # -------------------------------------------------------------------------
  pre-trade-checker:
    build:
      context: ../
      dockerfile: infra/pre-trade-checker.Dockerfile
    container_name: shrap_pre_trade_checker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PRE_TRADE_CHECKER_REDIS_URL: "redis://redis:6379/0"
      PRE_TRADE_CHECKER_ALLOWED_UNIVERSE: "${PRE_TRADE_CHECKER_ALLOWED_UNIVERSE:-AAPL,NVDA,QQQ,SPY,TSLA,LMT}"
      PRE_TRADE_CHECKER_MAX_QUANTITY_PER_ORDER: "${PRE_TRADE_CHECKER_MAX_QUANTITY_PER_ORDER:-1}"
      PRE_TRADE_CHECKER_KILL_SWITCH_ACTIVE: "${PRE_TRADE_CHECKER_KILL_SWITCH_ACTIVE:-false}"
      PRE_TRADE_CHECKER_MAX_ORDERS_PER_DAY: "${PRE_TRADE_CHECKER_MAX_ORDERS_PER_DAY:-10}"
      PRE_TRADE_CHECKER_SYMBOL_COOLDOWN_SECONDS: "${PRE_TRADE_CHECKER_SYMBOL_COOLDOWN_SECONDS:-300}"
      PRE_TRADE_CHECKER_START_ID: "0-0"
      PRE_TRADE_CHECKER_COUNT: "100"
      PRE_TRADE_CHECKER_BLOCK_MS: "5000"
      PRE_TRADE_CHECKER_RETRY_DELAY_SECONDS: "1.0"
      PRE_TRADE_CHECKER_LOG_LEVEL: "INFO"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - shrap_net

  # -------------------------------------------------------------------------
  # Execution Agent - paper-only broker handoff. Consumes approved risk
  # decisions and submits Alpaca paper market orders.
  # -------------------------------------------------------------------------
  execution-agent:
    build:
      context: ../
      dockerfile: infra/execution-agent.Dockerfile
    container_name: shrap_execution_agent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      EXECUTION_AGENT_REDIS_URL: "redis://redis:6379/0"
      EXECUTION_AGENT_ALPACA_API_KEY: "${ALPACA_API_KEY}"
      EXECUTION_AGENT_ALPACA_SECRET_KEY: "${ALPACA_SECRET_KEY}"
      EXECUTION_AGENT_ALPACA_ENDPOINT: "${ALPACA_ENDPOINT:-https://paper-api.alpaca.markets}"
      EXECUTION_AGENT_START_ID: "0-0"
      EXECUTION_AGENT_COUNT: "100"
      EXECUTION_AGENT_BLOCK_MS: "5000"
      EXECUTION_AGENT_RETRY_DELAY_SECONDS: "1.0"
      EXECUTION_AGENT_STATUS_POLL_INTERVAL_SECONDS: "5.0"
      EXECUTION_AGENT_LOG_LEVEL: "INFO"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - shrap_net

  # -------------------------------------------------------------------------
  # Paper Order Store - persists paper execution submitted/status/fill events
  # into trading.paper_order_events. It is append-only; reconciliation and
  # current position derivation are intentionally later cards.
  # -------------------------------------------------------------------------
  paper-order-store:
    build:
      context: ../
      dockerfile: infra/paper-order-store.Dockerfile
    container_name: shrap_paper_order_store
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PAPER_ORDER_STORE_REDIS_URL: "redis://redis:6379/0"
      PAPER_ORDER_STORE_POSTGRES_DSN: "postgresql://${SHRAP_DB_USER}:${SHRAP_DB_PASSWORD}@postgres:5432/${SHRAP_DB_NAME}"
      PAPER_ORDER_STORE_START_ID: "0-0"
      PAPER_ORDER_STORE_COUNT: "100"
      PAPER_ORDER_STORE_BLOCK_MS: "5000"
      PAPER_ORDER_STORE_RETRY_DELAY_SECONDS: "1.0"
      PAPER_ORDER_STORE_LOG_LEVEL: "INFO"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - shrap_net

  # -------------------------------------------------------------------------
  # Reconciliation Agent - compares Alpaca paper account/orders against the
  # persisted trading.paper_order_events trail on a simple interval and
  # publishes operations.reconciliation-completed / -discrepancy events.
  # -------------------------------------------------------------------------
  reconciliation-agent:
    build:
      context: ../
      dockerfile: infra/reconciliation-agent.Dockerfile
    container_name: shrap_reconciliation_agent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RECONCILIATION_AGENT_REDIS_URL: "redis://redis:6379/0"
      RECONCILIATION_AGENT_POSTGRES_DSN: "postgresql://${SHRAP_DB_USER}:${SHRAP_DB_PASSWORD}@postgres:5432/${SHRAP_DB_NAME}"
      RECONCILIATION_AGENT_ALPACA_API_KEY: "${ALPACA_API_KEY}"
      RECONCILIATION_AGENT_ALPACA_SECRET_KEY: "${ALPACA_SECRET_KEY}"
      RECONCILIATION_AGENT_ALPACA_ENDPOINT: "${ALPACA_ENDPOINT:-https://paper-api.alpaca.markets}"
      RECONCILIATION_AGENT_INTERVAL_SECONDS: "300"
      RECONCILIATION_AGENT_RETRY_DELAY_SECONDS: "30"
      RECONCILIATION_AGENT_LOOKBACK_DAYS: "${RECONCILIATION_AGENT_LOOKBACK_DAYS:-7}"
      RECONCILIATION_AGENT_LOG_LEVEL: "INFO"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - shrap_net

  # -------------------------------------------------------------------------
  # Decision Maker (Card 2 wire stub) - converts trading.strategy.signal into
  # trading.decision.intent above a confidence threshold. start_id=$ so a
  # restart never re-trades historical signals.
  # -------------------------------------------------------------------------
  decision-maker:
    build:
      context: ../
      dockerfile: infra/decision-maker.Dockerfile
    container_name: shrap_decision_maker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DECISION_MAKER_REDIS_URL: "redis://redis:6379/0"
      DECISION_MAKER_START_ID: "$$"
      DECISION_MAKER_CONFIDENCE_THRESHOLD: "0.7"
      DECISION_MAKER_LOG_LEVEL: "INFO"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - shrap_net

  # -------------------------------------------------------------------------
  # Strategy Fixture - deterministic pipeline-exercise signal source.
  # DISABLED BY DEFAULT: set STRATEGY_FIXTURE_ENABLED=true in infra/.env to
  # arm it. At most max_signals_per_day regime-gated signals per UTC day;
  # the pre-trade rate guardrails still apply downstream.
  # -------------------------------------------------------------------------
  strategy-fixture:
    build:
      context: ../
      dockerfile: infra/strategy-fixture.Dockerfile
    container_name: shrap_strategy_fixture
    restart: unless-stopped
    env_file:
      - .env
    environment:
      STRATEGY_FIXTURE_REDIS_URL: "redis://redis:6379/0"
      STRATEGY_FIXTURE_ENABLED: "${STRATEGY_FIXTURE_ENABLED:-false}"
      STRATEGY_FIXTURE_TICKER: "${STRATEGY_FIXTURE_TICKER:-SPY}"
      STRATEGY_FIXTURE_ALLOWED_REGIME_LABELS: "${STRATEGY_FIXTURE_ALLOWED_REGIME_LABELS:-crisis-recovery,late-cycle-melt-up}"
      STRATEGY_FIXTURE_MAX_SIGNALS_PER_DAY: "${STRATEGY_FIXTURE_MAX_SIGNALS_PER_DAY:-1}"
      STRATEGY_FIXTURE_INTERVAL_SECONDS: "600"
      STRATEGY_FIXTURE_LOG_LEVEL: "INFO"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - shrap_net

  # -------------------------------------------------------------------------
  # Strategy Librarian - Research Department, the registry's event-facing
  # half. Consumes research.strategy.verdict, applies lifecycle transitions
  # through the state-machine-enforcing registry, publishes
  # research.strategy.* lifecycle events. Idles until an Evaluator exists.
  # -------------------------------------------------------------------------
  strategy-librarian:
    build:
      context: ../
      dockerfile: infra/strategy-librarian.Dockerfile
    container_name: shrap_strategy_librarian
    restart: unless-stopped
    env_file:
      - .env
    environment:
      STRATEGY_LIBRARIAN_REDIS_URL: "redis://redis:6379/0"
      STRATEGY_LIBRARIAN_POSTGRES_DSN: "postgresql://${SHRAP_DB_USER}:${SHRAP_DB_PASSWORD}@postgres:5432/${SHRAP_DB_NAME}"
      STRATEGY_LIBRARIAN_START_ID: "0"
      STRATEGY_LIBRARIAN_COUNT: "100"
      STRATEGY_LIBRARIAN_BLOCK_MS: "5000"
      STRATEGY_LIBRARIAN_RETRY_DELAY_SECONDS: "1.0"
      STRATEGY_LIBRARIAN_LOG_LEVEL: "INFO"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - shrap_net

  # -------------------------------------------------------------------------
  # Regime Classifier - Intelligence Department, statistical layer only.
  # Syncs daily bars (Alpaca data API, IEX feed) into market_data.ohlcv_1d
  # and publishes intel.regime.tick / .changed / .sizing-modifier events.
  # The LLM historical-analog layer is deferred (Month 3, feature flag).
  # -------------------------------------------------------------------------
  regime-classifier:
    build:
      context: ../
      dockerfile: infra/regime-classifier.Dockerfile
    container_name: shrap_regime_classifier
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REGIME_CLASSIFIER_REDIS_URL: "redis://redis:6379/0"
      REGIME_CLASSIFIER_POSTGRES_DSN: "postgresql://${SHRAP_DB_USER}:${SHRAP_DB_PASSWORD}@postgres:5432/${SHRAP_DB_NAME}"
      REGIME_CLASSIFIER_ALPACA_API_KEY: "${ALPACA_API_KEY}"
      REGIME_CLASSIFIER_ALPACA_SECRET_KEY: "${ALPACA_SECRET_KEY}"
      REGIME_CLASSIFIER_SYMBOLS: "${REGIME_CLASSIFIER_SYMBOLS:-SPY,QQQ,IWM,HYG,TLT,AAPL,NVDA,TSLA,LMT}"
      REGIME_CLASSIFIER_INTERVAL_SECONDS: "300"
      REGIME_CLASSIFIER_DEBOUNCE_M: "3"
      REGIME_CLASSIFIER_LOG_LEVEL: "INFO"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - shrap_net
